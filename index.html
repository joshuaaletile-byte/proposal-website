<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Haliyah ❤️</title>

<link rel="stylesheet" href="style.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">

<!-- Confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

</head>

<body>

<!-- Background -->
<div class="background"></div>

<!-- Dark Overlay -->
<div class="overlay"></div>

<!-- Intro Screen -->
<div id="loader">

<h2>Initializing Love Protocol...</h2>

<p>Loading Memories...</p>

<p>Scanning Heart...</p>

<p>Connection Established ❤️</p>

</div>

<!-- Music Button -->
<button id="musicBtn">

🔊 Music

</button>

<!-- Audio -->
<audio id="bgMusic" loop>
<source src="music/song.mp3" type="audio/mpeg">
</audio>

<!-- HUD Container -->

<div id="mainContent">

<h1 class="name">
Haliyah ❤️
</h1>

<h2 class="question">

Will You Marry Me?

</h2>

<p class="subtitle">

Every moment with you has brought me here.

I hope you'll say YES.

</p>

<div class="buttons">

<button id="yesBtn">

YES ❤️

</button>

<button id="noBtn">

NO 💔

</button>

</div>

</div>

<!-- Message after YES -->

<div id="success">

<h1>

❤️ Forever Begins Today ❤️

</h1>

<p>

You just made me the happiest person alive.

</p>

</div>

<script src="script.js"></script>

</body>
</html>
