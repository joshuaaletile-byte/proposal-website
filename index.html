<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Haliyah ❤️</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

</head>

<body>

<!-- Background -->
<div class="background"></div>
<div class="overlay"></div>

<!-- HUD -->
<div class="hud-grid"></div>
<div class="scan-line"></div>

<!-- Music -->
<button id="musicBtn">🔊</button>

<audio id="bgMusic" loop>
    <source src="music/song.mp3" type="audio/mpeg">
</audio>

<!-- Boot Screen -->
<section id="boot">

<h1>PH03NIX LOVE PROTOCOL</h1>

<div id="terminal">

<p class="line">Initializing System...</p>

<p class="line">Loading Memories...</p>

<p class="line">Scanning Heart...</p>

<p class="line">Searching...</p>

<p class="line glow">Haliyah ❤️ Found</p>

<p class="line">Establishing Connection...</p>

<p class="line success">CONNECTED ✓</p>

</div>

</section>

<!-- Main Proposal -->
<section id="main">

<h1 id="name"></h1>

<h2 id="question"></h2>

<p id="subtitle"></p>

<div class="buttons">

<button id="yesBtn">

YES ❤️

</button>

<button id="noBtn">

NO 💔

</button>

</div>

</section>

<!-- Celebration -->
<section id="celebration">

<h1>

❤️ SHE SAID YES ❤️

</h1>

<p>

Forever Begins Today

</p>

</section>

<!-- Love Letter -->
<section id="letter">

<div class="paper">

<h2>Dear Haliyah ❤️</h2>

<p id="letterText"></p>

</div>

</section>

<script src="voice.js"></script>
<script src="effects.js"></script>
<script src="script.js"></script>

</body>
</html>
